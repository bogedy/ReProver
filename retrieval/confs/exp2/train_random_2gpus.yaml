seed_everything: 3407  # https://arxiv.org/abs/2109.08203
trainer:
  accumulate_grad_batches: 2
  accelerator: gpu
  devices: 2
  precision: bf16-mixed
  strategy:
    class_path: pytorch_lightning.strategies.DDPStrategy
    init_args:
      find_unused_parameters: false
  logger:
    class_path: pytorch_lightning.loggers.WandbLogger
    init_args:
      name: exp2_train_random_2gpus
      save_dir: out/exp2/train_random_2gpus
  gradient_clip_val: 1.0
  max_steps: 800000
  callbacks:
    - class_path: pytorch_lightning.callbacks.LearningRateMonitor
      init_args: 
        logging_interval: step
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        verbose: true
        save_top_k: 1
        save_last: true
        monitor: Recall@10_val
        mode: max
    - class_path: pytorch_lightning.callbacks.EarlyStopping
      init_args:
        monitor: Recall@10_val
        patience: 5
        mode: max
        verbose: true

model:
  model_name: google/byt5-small
  lr: 1e-4
  warmup_steps: 2000
  num_retrieved: 100

data:
  data_path: data/leandojo_benchmark_4/random/
  corpus_path: data/leandojo_benchmark_4/corpus.jsonl
  num_negatives: 3
  num_in_file_negatives: 1
  batch_size: 3
  eval_batch_size: 64
  max_seq_len: 1024
  num_workers: 8
